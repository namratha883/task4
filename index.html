<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart To-Do Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>📝 Smart To-Do Manager</h1>

    <div class="top-buttons">
        <button class="darkBtn" onclick="toggleTheme()">🌙 Dark Mode</button>
        <button class="savedBtn" onclick="toggleSaved()">📂 View Saved Tasks</button>
    </div>

    <input type="text"
           id="search"
           placeholder="🔍 Search Tasks..."
           onkeyup="renderTasks()">

    <div class="input-section">

        <input type="text"
               id="taskInput"
               placeholder="Enter Task">

        <input type="date" id="taskDate">

        <input type="time" id="taskTime">

        <select id="priority">
            <option value="low">🟢 Low</option>
            <option value="medium">🟠 Medium</option>
            <option value="high">🔴 High</option>
        </select>

        <button class="addBtn"
                onclick="addTask()">
            ➕ Add
        </button>

    </div>

    <div class="progressBox">
        <div class="progress" id="progress"></div>
    </div>

    <p id="stats">0 / 0 Completed</p>

    <div id="taskList"></div>

    <div id="savedSection" class="hidden">

        <h2>📌 Pinned Tasks</h2>
        <div id="pinned"></div>

        <h2>📋 Pending Tasks</h2>
        <div id="pending"></div>

        <h2>✅ Completed Tasks</h2>
        <div id="completed"></div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
